name: Build SmartMark APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
      
      - name: Setup Capacitor
        run: |
          npx cap init SmartMark com.smartmark.app --web-dir www
          npx cap add android
          npx cap copy android
      
      - name: Generate Icons from Embedded Logo
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Decode your exact logo from base64
          echo '' | base64 -d > /tmp/smartmark_logo.jpg
          
          # Generate all densities from your exact logo
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi) size=48 ;;
              hdpi) size=72 ;;
              xhdpi) size=96 ;;
              xxhdpi) size=144 ;;
              xxxhdpi) size=192 ;;
            esac
            mkdir -p android/app/src/main/res/mipmap-$density
            convert /tmp/smartmark_logo.jpg -resize ${size}x${size} -background none -gravity center -extent ${size}x${size}               android/app/src/main/res/mipmap-$density/ic_launcher.png
            cp android/app/src/main/res/mipmap-$density/ic_launcher.png                android/app/src/main/res/mipmap-$density/ic_launcher_round.png
          done
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: SmartMark-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
