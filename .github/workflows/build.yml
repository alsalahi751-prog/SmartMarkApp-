name: Build SmartMark APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify www/index.html
        run: |
          echo "=== Checking index.html ==="
          if [ ! -f "www/index.html" ]; then
            echo "❌ ERROR: www/index.html not found!"
            exit 1
          fi
          ls -lh www/index.html
          LINES=$(wc -l < www/index.html)
          echo "Lines: $LINES"
          if [ "$LINES" -lt 500 ]; then
            echo "❌ ERROR: index.html is corrupted (only $LINES lines, expected >1000)"
            echo "Please upload the correct full index.html file"
            exit 1
          fi
          echo "✓ index.html is valid"

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Setup Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap init SmartMark com.smartmark.app --web-dir www
            npx cap add android
          fi

      - name: Clean and copy
        run: |
          rm -rf android/app/src/main/assets/public
          npx cap copy android

      - name: Build APK
        run: |
          cd android
          ./gradlew clean
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: SmartMark-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
