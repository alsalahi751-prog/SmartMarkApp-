name: Build SmartMark APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor v5
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Setup Android project
        run: |
          npx cap init SmartMark com.smartmark.app --web-dir www
          npx cap add android
          npx cap copy android

      - name: Copy app icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp mipmap-${density}/ic_launcher.png android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp mipmap-${density}/ic_launcher.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
            cp mipmap-${density}/ic_launcher.png android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png
          done

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: SmartMark-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
