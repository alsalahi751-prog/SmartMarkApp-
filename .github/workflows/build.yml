name: Build SmartMark APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor v5
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Setup Android project
        run: |
          npx cap init SmartMark com.smartmark.app --web-dir www
          npx cap add android
          npx cap copy android

      - name: Copy app icons
        run: |
          cp -r mipmap-mdpi android/app/src/main/res/
          cp -r mipmap-hdpi android/app/src/main/res/
          cp -r mipmap-xhdpi android/app/src/main/res/
          cp -r mipmap-xxhdpi android/app/src/main/res/
          cp -r mipmap-xxxhdpi android/app/src/main/res/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: SmartMark-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
