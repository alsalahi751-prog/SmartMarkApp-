<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>SmartMark v2.2</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
        body{background:#0a0a14;color:#fff;min-height:100vh;padding-bottom:80px}
        .header{display:flex;justify-content:space-between;align-items:center;padding:20px}
        .title{font-size:28px;font-weight:bold}
        .btn-add{background:#6366f1;border:none;padding:12px 20px;border-radius:12px;color:#fff;font-size:16px;cursor:pointer}
        .trash{background:#2a2a3a;border:none;padding:12px 20px;border-radius:12px;color:#fff;margin:0 20px;display:flex;align-items:center;gap:8px}
        .search{margin:20px;background:#1a1a2a;border:none;border-radius:12px;padding:14px;width:calc(100% - 40px);color:#fff;font-size:15px}
        .empty{text-align:center;margin-top:80px}
        .empty img{width:100px;opacity:0.5;margin-bottom:20px}
        .empty h3{font-size:18px;margin-bottom:10px;color:#999}
        .empty p{color:#666;font-size:14px}
        .fab{position:fixed;bottom:90px;left:20px;width:60px;height:60px;background:#6366f1;border-radius:16px;border:none;color:#fff;font-size:32px;cursor:pointer;box-shadow:0 4px 12px rgba(99,102,241,0.4)}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#14141f;display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid #2a2a3a}
        .nav-item{text-align:center;font-size:12px;color:#666;cursor:pointer}
        .nav-item.active{color:#6366f1}
        .nav-item span{font-size:24px;display:block;margin-bottom:4px}
        #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:12px 24px;border-radius:8px;display:none;z-index:999}
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="header">
        <button class="btn-add" id="btnNew">+ جديد</button>
        <div class="title" id="appTitle">📝 مذكراتي</div>
    </div>
    <button class="trash" id="btnTrash">♻️ سلة المحذوفات</button>
    <input type="text" class="search" placeholder="ابحث في المذكرات...">
    
    <div class="empty">
        <div style="font-size:80px">📝</div>
        <h3>لا توجد مذكرات</h3>
        <p>اضغط + لإضافة مذكرة جديدة</p>
    </div>

    <button class="fab" id="fab">+</button>

    <div class="bottom-nav">
        <div class="nav-item"><span>🏠</span>الرئيسية</div>
        <div class="nav-item"><span>📌</span>المحفوظات</div>
        <div class="nav-item"><span>📁</span>مجلدات</div>
        <div class="nav-item active"><span>📝</span>مذكرات</div>
        <div class="nav-item"><span>⚙️</span>الإعدادات</div>
    </div>

    <script>
    // قاتل الكاش + تفعيل الأزرار لـ Capacitor
    document.addEventListener('DOMContentLoaded', function() {
        
        // 1. مسح أي بيانات قديمة مرة واحدة
        if (!localStorage.getItem('sm_v22_clear')) {
            localStorage.clear();
            localStorage.setItem('sm_v22_clear', '1');
            showToast('تم تنظيف البيانات القديمة');
        }

        // 2. تفعيل الأزرار
        document.getElementById('btnNew').onclick = newNote;
        document.getElementById('fab').onclick = newNote;
        document.getElementById('btnTrash').onclick = function(){
            showToast('سلة المحذوفات فارغة');
        };

        // 3. النقر مرتين على العنوان للتبديل للغة + مسح الكل
        let clickCount = 0;
        document.getElementById('appTitle').onclick = function() {
            clickCount++;
            if (clickCount === 2) {
                if (this.innerText.includes('مذكراتي')) {
                    this.innerText = '📝 My Notes';
                    showToast('Switched to English');
                } else {
                    this.innerText = '📝 مذكراتي';
                    showToast('تم التبديل للعربية');
                }
                // إظهار زر مسح الكل
                let clearBtn = document.getElementById('clearAll');
                if (!clearBtn) {
                    clearBtn = document.createElement('button');
                    clearBtn.id = 'clearAll';
                    clearBtn.innerText = 'Clear All';
                    clearBtn.style.cssText = 'position:fixed;top:70px;left:20px;background:#ef4444;border:none;padding:8px 16px;border-radius:8px;color:#fff;z-index:999';
                    clearBtn.onclick = function(){
                        localStorage.clear();
                        location.reload();
                    };
                    document.body.appendChild(clearBtn);
                }
                clickCount = 0;
            }
            setTimeout(()=>{clickCount=0}, 400);
        };

        function newNote() {
            let text = prompt('اكتب مذكرتك:');
            if (text) showToast('تم الحفظ: ' + text.substring(0,20));
        }

        function showToast(msg) {
            let t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(()=>{t.style.display='none'}, 2000);
        }
    });
    </script>
</body>
</html>
