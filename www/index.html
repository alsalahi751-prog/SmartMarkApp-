<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SmartMark Pro</title>
<!-- SmartMark v2.1.0 - 2026-04-09 CACHE BUSTER -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
/* Core fixes from previous version */
:root{--primary:#6366f1;--bg:#0a0a14;--card:#1a1a2e}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,Tahoma;background:var(--bg);color:#f1f5f9;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
/* FIX 1: z-index for background to prevent click blocking */
.bg-animation{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.3}
/* FIX 2: 44px touch targets */
.btn{min-height:44px;min-width:44px;padding:12px 20px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:700;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation}
.btn:active{transform:scale(0.96)}
.btn-secondary{background:#2d2d44}
.header{display:flex;align-items:center;gap:12px;padding:16px;flex-wrap:wrap}
.search{margin:0 16px 16px;position:relative}
.search input{width:100%;padding:14px 44px 14px 16px;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:white;font-size:15px;min-height:44px}
.search .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:0.5}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0f0f1a;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0;max-width:480px;margin:0 auto}
.nav-item{flex:1;text-align:center;padding:8px;color:#64748b;font-size:12px;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.nav-item.active{color:var(--primary)}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:16px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 12px rgba(99,102,241,0.4);z-index:10}
</style>
</head>
<body>
<div class="bg-animation"></div>
<div class="app">
  <div class="header">
    <h1 style="margin:0;font-size:24px;flex:1">مذكراتي <span id="noteIcon">📝</span></h1>
    <button class="btn" id="newBtn">+ جديد</button>
    <button class="btn btn-secondary" id="trashBtn">سلة المحذوفات ♻️</button>
  </div>
  
  <div class="search">
    <input type="search" id="searchInput" placeholder="ابحث في المذكرات...">
    <span class="icon">🔍</span>
  </div>

  <div id="notesList" style="flex:1;padding:0 16px 100px">
    <div class="empty">
      <div class="empty-icon">📝</div>
      <div style="font-size:18px;margin-bottom:8px">لا توجد مذكرات</div>
      <div style="font-size:14px">اضغط + لإضافة مذكرة جديدة</div>
    </div>
  </div>

  <div class="fab" id="fabBtn">+</div>

  <div class="nav">
    <div class="nav-item"><div style="font-size:20px">⚙️</div><div>الإعدادات</div></div>
    <div class="nav-item active"><div style="font-size:20px">📝</div><div>مذكرات</div></div>
    <div class="nav-item"><div style="font-size:20px">📁</div><div>مجلدات</div></div>
    <div class="nav-item"><div style="font-size:20px">📌</div><div>المحفوظات</div></div>
    <div class="nav-item"><div style="font-size:20px">🏠</div><div>الرئيسية</div></div>
  </div>
</div>

<script>
// ===== SMARTMARK v2.1.0 - CACHE BUSTER =====
const APP_VERSION = '2.1.0-20260409';
if (localStorage.getItem('sm_version') !== APP_VERSION) {
  console.log('Clearing old cache...');
  ['smartmark_notes','smartmark_bookmarks','smartmark_folders','smartmark_trash','smartmark_lang','smartmark_data'].forEach(k=>localStorage.removeItem(k));
  localStorage.setItem('sm_version', APP_VERSION);
  // Force reload once
  if(!sessionStorage.getItem('reloaded')){
    sessionStorage.setItem('reloaded','1');
    location.reload(true);
  }
}

// ===== TRANSLATIONS FIX =====
const translations = {
  ar: {
    title: 'مذكراتي',
    new: '+ جديد',
    trash: 'سلة المحذوفات',
    search: 'ابحث في المذكرات...',
    empty: 'لا توجد مذكرات',
    emptyHint: 'اضغط + لإضافة مذكرة جديدة',
    clear: 'مسح',
    settings: 'الإعدادات',
    notes: 'مذكرات',
    folders: 'مجلدات',
    saved: 'المحفوظات',
    home: 'الرئيسية'
  },
  en: {
    title: 'My Notes',
    new: '+ New',
    trash: 'Trash',
    search: 'Search notes...',
    empty: 'No notes',
    emptyHint: 'Tap + to add new note',
    clear: 'Clear',
    settings: 'Settings',
    notes: 'Notes',
    folders: 'Folders',
    saved: 'Saved',
    home: 'Home'
  }
};

let currentLang = localStorage.getItem('smartmark_lang') || 'ar';

function applyLang(){
  const t = translations[currentLang];
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.querySelector('h1').innerHTML = t.title + ' <span id="noteIcon">📝</span>';
  document.getElementById('newBtn').textContent = t.new;
  document.getElementById('trashBtn').innerHTML = t.trash + ' ♻️';
  document.getElementById('searchInput').placeholder = t.search;
  // Update empty state
  const emptyDiv = document.querySelector('.empty');
  if(emptyDiv){
    emptyDiv.querySelector('div:nth-child(2)').textContent = t.empty;
    emptyDiv.querySelector('div:nth-child(3)').textContent = t.emptyHint;
  }
  // Update nav
  const navItems = document.querySelectorAll('.nav-item div:last-child');
  if(navItems.length >=5){
    navItems[0].textContent = t.settings;
    navItems[1].textContent = t.notes;
    navItems[2].textContent = t.folders;
    navItems[3].textContent = t.saved;
    navItems[4].textContent = t.home;
  }
}

// Initialize
applyLang();

// FIX 3: Make buttons actually work with proper touch
document.getElementById('newBtn').addEventListener('click', ()=>alert(translations[currentLang].new));
document.getElementById('fabBtn').addEventListener('click', ()=>alert(translations[currentLang].new));
document.getElementById('trashBtn').addEventListener('click', ()=>alert(translations[currentLang].trash));

// Demo language toggle (double tap title)
let taps = 0;
document.querySelector('h1').addEventListener('click', ()=>{
  taps++;
  setTimeout(()=>taps=0, 300);
  if(taps===2){
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('smartmark_lang', currentLang);
    applyLang();
    taps=0;
  }
});

console.log('SmartMark v2.1 loaded - cache cleared');
</script>
</body>
</html>
