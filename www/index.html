<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>SmartMark</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#0a0a14;color:#fff;min-height:100vh;padding-bottom:80px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px}
.header-left{display:flex;gap:8px}
.title{font-size:26px;font-weight:bold}
.btn{border:none;padding:10px 16px;border-radius:12px;color:#fff;font-size:14px;cursor:pointer}
.btn-primary{background:#6366f1}
.btn-dark{background:#1a1a2a}
.search{margin:15px 20px;background:#1a1a2a;border:none;border-radius:12px;padding:13px;width:calc(100% - 40px);color:#fff;font-size:15px}
.page{display:none;padding:0 10px}
.page.active{display:block}
.empty{text-align:center;margin-top:70px}
.empty .icon{font-size:80px;opacity:.6;margin-bottom:15px}
.item{background:#1a1a2a;margin:12px 10px;padding:14px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px}
.item .check{width:22px;height:22px;border:2px solid #555;border-radius:6px;display:none;align-items:center;justify-content:center}
.item.selected .check{background:#6366f1;border-color:#6366f1}
.item.selected .check::after{content:'✓';font-size:14px}
.item-content{flex:1}
.item h4{margin-bottom:6px;font-size:16px}
.item p{color:#999;font-size:13px;word-break:break-word}
.item small{color:#666}
.select-bar{position:fixed;bottom:70px;left:0;right:0;background:#14141f;padding:12px;display:none;justify-content:space-around;border-top:1px solid #2a2a3a;z-index:20}
.select-bar button{background:none;border:none;color:#ccc;font-size:13px}
.select-bar button.primary{color:#6366f1}
.fab{position:fixed;bottom:90px;left:20px;width:58px;height:58px;background:#6366f1;border-radius:16px;border:none;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 4px 12px rgba(99,102,241,.4);z-index:10}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#14141f;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #2a2a3a}
.nav-item{text-align:center;font-size:12px;color:#666;cursor:pointer;padding:4px 8px}
.nav-item.active{color:#6366f1}
.nav-item span{font-size:22px;display:block;margin-bottom:3px}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:8px;display:none;z-index:999}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:#14141f;width:100%;max-width:380px;border-radius:16px;padding:20px}
.modal-box h3{margin-bottom:15px}
.modal-box textarea,.modal-box input{width:100%;background:#0a0a14;border:1px solid #2a2a3a;color:#fff;padding:12px;border-radius:10px;font-size:15px;margin-bottom:10px}
.modal-box textarea{min-height:120px}
.modal-actions{display:flex;gap:10px}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div id="toast"></div>

<div class="header">
  <div class="header-left">
    <button class="btn btn-primary" id="btnNew">+ جديد</button>
    <button class="btn btn-dark" id="btnSelect">تحديد</button>
  </div>
  <div class="title">📝 مذكراتي</div>
</div>

<div id="page-notes" class="page active">
  <input type="text" id="search" class="search" placeholder="ابحث في المذكرات...">
  <div id="notesList"></div>
  <div id="emptyNotes" class="empty"><div class="icon">📝</div><h3>لا توجد مذكرات</h3></div>
</div>

<div id="page-folders" class="page">
  <div id="foldersList"></div>
  <div id="emptyFolders" class="empty"><div class="icon">📁</div><h3>لا توجد مجلدات</h3></div>
</div>

<div id="page-settings" class="page">
  <div style="padding:20px">
    <h3 style="margin-bottom:15px">الإعدادات</h3>
    <button id="exportBtn" style="background:#1a1a2a;border:none;padding:14px;border-radius:12px;color:#fff;width:100%;margin-bottom:12px;text-align:right">📤 تصدير المذكرات</button>
    <button id="backupBtn" style="background:#1a1a2a;border:none;padding:14px;border-radius:12px;color:#fff;width:100%;margin-bottom:12px;text-align:right">💾 نسخة احتياطية</button>
    <button id="clearAll" style="background:#ef4444;border:none;padding:14px;border-radius:12px;color:#fff;width:100%;margin-bottom:12px">مسح كل البيانات</button>
  </div>
</div>

<div id="page-home" class="page"><div class="empty"><div class="icon">🏠</div><h3>الرئيسية</h3></div></div>
<div id="page-saved" class="page"><div class="empty"><div class="icon">📌</div><h3>المحفوظات</h3></div></div>
<div id="page-trash" class="page"><div class="empty"><div class="icon">♻️</div><h3>سلة المحذوفات</h3></div></div>

<div class="select-bar" id="selectBar">
  <button id="selCopy">نسخ</button>
  <button id="selDelete" style="color:#ef4444">حذف</button>
  <button id="selAll" class="primary">تحديد الكل</button>
  <button id="selCancel">إلغاء</button>
</div>

<button class="fab" id="fab">+</button>

<div class="bottom-nav">
  <div class="nav-item" data-page="home"><span>🏠</span>الرئيسية</div>
  <div class="nav-item" data-page="saved"><span>📌</span>محفوظات</div>
  <div class="nav-item active" data-page="folders"><span>📁</span>مجلدات</div>
  <div class="nav-item active" data-page="notes"><span>📝</span>مذكرات</div>
  <div class="nav-item" data-page="settings"><span>⚙️</span>إعدادات</div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>مذكرة جديدة</h3>
    <textarea id="noteText" placeholder="اكتب مذكرتك..."></textarea>
    <input id="noteLink" placeholder="إضافة رابط محتوى (اختياري)">
    <div class="modal-actions">
      <button class="btn-dark" id="modalCancel" style="background:#2a2a3a;color:#ccc">إلغاء</button>
      <button class="btn-primary" id="modalSave">حفظ</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-box">
    <h3 id="exportTitle">تصدير</h3>
    <textarea id="exportText" style="height:220px"></textarea>
    <div class="modal-actions">
      <button class="btn-dark" id="closeExport" style="background:#2a2a3a">إغلاق</button>
      <button class="btn-primary" id="copyExport">نسخ الكل</button>
    </div>
  </div>
</div>

<script>
const NK='sm_notes', FK='sm_folders';
let notes=JSON.parse(localStorage.getItem(NK)||'[]');
let folders=JSON.parse(localStorage.getItem(FK)||'[]');
let selectMode=false, selected=new Set();

const save=()=>{localStorage.setItem(NK,JSON.stringify(notes));localStorage.setItem(FK,JSON.stringify(folders));};
const toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600);};

function renderNotes(){
  const q=document.getElementById('search').value||''; const list=document.getElementById('notesList');
  const f=notes.filter(n=>n.text.includes(q)||(n.link||'').includes(q));
  list.innerHTML=''; document.getElementById('emptyNotes').style.display=f.length?'none':'block';
  f.slice().reverse().forEach(n=>{
    const d=document.createElement('div'); d.className='item'+(selected.has(n.id)?' selected':''); d.dataset.id=n.id;
    d.innerHTML=`<div class="check"></div><div class="item-content"><h4>${n.text.substring(0,40)}</h4>${n.link?`<p style="color:#6366f1">${n.link}</p>`:''}<small>${new Date(n.date).toLocaleDateString('ar-EG')}</small></div>`;
    d.onclick=()=>{if(selectMode){toggleSelect(n.id)}else{}};
    list.appendChild(d);
  });
  document.querySelectorAll('.check').forEach(c=>c.style.display=selectMode?'flex':'none');
}
function toggleSelect(id){selected.has(id)?selected.delete(id):selected.add(id);renderNotes();}

document.getElementById('btnSelect').onclick=()=>{selectMode=!selectMode;selected.clear();document.getElementById('selectBar').style.display=selectMode?'flex':'none';document.getElementById('btnSelect').textContent=selectMode?'تم': 'تحديد';renderNotes();};
document.getElementById('selCancel').onclick=()=>document.getElementById('btnSelect').click();
document.getElementById('selAll').onclick=()=>{notes.forEach(n=>selected.add(n.id));renderNotes();};
document.getElementById('selDelete').onclick=()=>{if(selected.size===0)return;if(confirm('حذف '+selected.size+' مذكرة؟')){notes=notes.filter(n=>!selected.has(n.id));save();selected.clear();document.getElementById('btnSelect').click();renderNotes();toast('تم الحذف');}};
document.getElementById('selCopy').onclick=()=>{const txt=notes.filter(n=>selected.has(n.id)).map(n=>n.text+(n.link?'\n'+n.link:'')).join('\n\n---\n\n');navigator.clipboard.writeText(txt);toast('تم نسخ '+selected.size);};

function renderFolders(){const list=document.getElementById('foldersList');list.innerHTML='';document.getElementById('emptyFolders').style.display=folders.length?'none':'block';folders.forEach(f=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<div class="item-content"><h4>📁 ${f.name}</h4></div>`;list.appendChild(d);});}

document.getElementById('btnNew').onclick=openModal;
document.getElementById('fab').onclick=()=>{if(document.getElementById('page-folders').classList.contains('active')){const name=prompt('اسم المجلد:');if(name){folders.push({id:Date.now(),name});save();renderFolders();}}else{openModal();}};
function openModal(){document.getElementById('noteText').value='';document.getElementById('noteLink').value='';document.getElementById('modal').style.display='flex';}
document.getElementById('modalCancel').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('modalSave').onclick=()=>{const t=document.getElementById('noteText').value.trim();if(!t)return;const l=document.getElementById('noteLink').value.trim();notes.push({id:Date.now(),text:t,link:l||null,date:Date.now()});save();renderNotes();document.getElementById('modal').style.display='none';toast('تم الحفظ');};

document.getElementById('search').oninput=renderNotes;
document.querySelectorAll('.nav-item').forEach(el=>{el.onclick=()=>{document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+el.dataset.page).classList.add('active');};});

document.getElementById('exportBtn').onclick=()=>{const txt=notes.map(n=>`[${new Date(n.date).toLocaleString('ar-EG')}]\n${n.text}${n.link?'\nرابط: '+n.link:''}`).join('\n\n---\n\n');document.getElementById('exportTitle').textContent='تصدير المذكرات';document.getElementById('exportText').value=txt;document.getElementById('exportModal').style.display='flex';};
document.getElementById('backupBtn').onclick=()=>{const data=JSON.stringify({notes,folders},null,2);document.getElementById('exportTitle').textContent='نسخة احتياطية';document.getElementById('exportText').value=data;document.getElementById('exportModal').style.display='flex';};
document.getElementById('copyExport').onclick=()=>{navigator.clipboard.writeText(document.getElementById('exportText').value);toast('تم النسخ - الصقه في واتساب');};
document.getElementById('closeExport').onclick=()=>document.getElementById('exportModal').style.display='none';
document.getElementById('clearAll').onclick=()=>{if(confirm('مسح كل شيء؟')){localStorage.clear();notes=[];folders=[];save();renderNotes();renderFolders();}};

renderNotes();renderFolders();
</script>
</body>
</html>
